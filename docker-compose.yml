version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_sec_tool_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # Optional: for hot reloading/data persistence
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_sec_tool_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
